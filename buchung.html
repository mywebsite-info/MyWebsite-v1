<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termin anfragen — MyWebsite</title>
  <meta name="description" content="Sichern Sie sich Ihr kostenloses Erstgespräch für Ihre neue Website.">
  
  <link rel="stylesheet" href="css/style.css?v=2.0">
  
  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      emailjs.init("_q0LSg9XyPe_lZyMA");
    })();
  </script>
</head>
<body>
  <!-- Ambient Background -->
  <div class="ambient-layer">
    <div class="ambient-shape ambient-shape-1"></div>
    <div class="ambient-shape ambient-shape-2"></div>
    <div class="ambient-shape ambient-shape-3"></div>
  </div>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a class="nav-logo" href="index.html">My<span>Website</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">Über uns</a>
        <a href="preise.html" class="active">Preise</a>
      </div>
      <div class="nav-actions">
        <a class="btn btn-primary" href="index.html#contact">Kontakt</a>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 140px; padding-bottom: 80px; display: flex; justify-content: center;">
    <section class="glass-card reveal" style="max-width: 680px; padding: 50px 40px; width: 100%;">
      <div style="text-align: center; margin-bottom: 40px;">
        <div class="section-label">Terminanfrage</div>
        <h1 class="section-title" style="font-size: 2.8rem;">Erstgespräch <span>buchen</span></h1>
        <p class="section-subtitle" style="margin: 0 auto;">Teilen Sie uns Ihre ersten Ideen mit und wählen Sie einen Wunschtermin.</p>
      </div>

      <form id="bookingForm" class="booking-page-form" style="display: flex; flex-direction: column; gap: 24px;">
        <input type="hidden" id="selectedPackage" name="package">
        
        <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
          <label class="form-label" for="bookingEmail" style="font-size: 0.85rem; font-weight: 700; color: var(--text-dim); margin-left: 4px;">Ihre E-Mail-Adresse *</label>
          <input class="form-control" type="email" id="bookingEmail" name="email" required placeholder="name@beispiel.de" 
                 style="background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 20px; color: #fff; font-size: 1rem;">
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
          <label class="form-label" for="bookingIdeas" style="font-size: 0.85rem; font-weight: 700; color: var(--text-dim); margin-left: 4px;">Erste Ideen / Wünsche</label>
          <textarea class="form-control" id="bookingIdeas" name="ideas" rows="4" placeholder="Beschreiben Sie kurz Ihr Projekt oder Ihre Fragen…"
                    style="background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 20px; color: #fff; font-size: 1rem; resize: vertical;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
            <label class="form-label" for="bookingDate" style="font-size: 0.85rem; font-weight: 700; color: var(--text-dim); margin-left: 4px;">Wunschtermin *</label>
            <input class="form-control" type="date" id="bookingDate" name="date" required
                   style="background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 20px; color: #fff; font-size: 1rem;">
          </div>
          <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
            <label class="form-label" for="bookingTime" style="font-size: 0.85rem; font-weight: 700; color: var(--text-dim); margin-left: 4px;">Uhrzeit</label>
            <input class="form-control" type="time" id="bookingTime" name="time" value="10:00"
                   style="background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 20px; color: #fff; font-size: 1rem;">
          </div>
        </div>

        <button class="btn btn-primary cta-main" type="submit" id="bookingSubmitBtn" style="width: 100%; margin-top: 20px; padding: 18px;">
          Anfrage jetzt absenden &rarr;
        </button>
        
        <p style="text-align: center; font-size: 0.85rem; color: var(--secondary); margin-top: 10px;">
          <a href="preise.html" style="text-decoration: underline;">Zurück zur Übersicht</a>
        </p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <div class="footer-logo">My<span>Website</span></div>
        <p>&copy; 2026 MyWebsite. Alle Rechte vorbehalten.</p>
        <div style="display: flex; gap: 24px; align-items: center; flex-wrap: wrap; justify-content: center;">
          <a class="footer-email" href="mailto:mywebsite.info@web.de" aria-label="E-Mail senden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            mywebsite.info@web.de
          </a>
          <a href="preise.html" class="footer-legal-link">Preise</a>
          <a href="impressum.html" class="footer-legal-link">Impressum & Datenschutz</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Get package from URL
      const params = new URLSearchParams(window.location.search);
      const pkg = params.get('package') || 'Allgemein';
      document.getElementById('selectedPackage').value = pkg;
      
      // Form Logic
      const form = document.getElementById('bookingForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('bookingSubmitBtn');
        const origText = btn.innerHTML;
        const email = document.getElementById('bookingEmail').value;
        const ideas = document.getElementById('bookingIdeas').value;
        const date = document.getElementById('bookingDate').value;
        const time = document.getElementById('bookingTime').value;

        btn.disabled = true;
        btn.innerHTML = 'Wird gesendet...';

        const templateParams = {
          from_email: email,
          message: `NEUE TERMINANFRAGE\nPaket-Basis: ${pkg}\nGewünschter Termin: ${date} um ${time}\n\nErste Ideen:\n${ideas}`,
          to_email: 'mywebsite.info@web.de'
        };

        try {
          if (window.emailjs) {
            await emailjs.send(
              'service_d24xvr1',
              'template_1e21emq',
              templateParams
            );
          }
          alert('Vielen Dank! Ihre Anfrage wurde erfolgreich gesendet. Wir melden uns in Kürze.');
          window.location.href = 'preise.html';
        } catch (err) {
          console.error(err);
          alert('Ein Fehler ist aufgetreten. Bitte senden Sie uns stattdessen direkt eine E-Mail an mywebsite.info@web.de');
        } finally {
          btn.disabled = false;
          btn.innerHTML = origText;
        }
      });
    });
  </script>
</body>
</html>
